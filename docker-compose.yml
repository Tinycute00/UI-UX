# Ta Chen PMIS — Local Development Stack (OPS-306, revised)
# ============================================================
# DEV-ONLY: passwords below are for local validation ONLY.
# DO NOT use in staging or production.
#
# DB: 使用現有 pmis-postgres (public_works_db)，不另起 postgres 服務
# ============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmis_backend_dev
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql://pmis_admin:***@host.docker.internal:5432/public_works_db"
      NODE_ENV: production
      PORT: "3000"
      CORS_ORIGIN: "*"
      JWT_SECRET: "dev-secret-key-at-least-32-characters-long!"
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src:ro
