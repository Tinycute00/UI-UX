<!-- ══════ SAFETY ══════ -->
<div id="v-safety" class="view">
  <div class="sh"><h2><span class="ic s22"><svg><use href="#ic-hat"/></svg></span> 工安巡檢</h2><button class="btn bp btn-sm" onclick="safetyStep(1)"><span class="ic s14"><svg><use href="#ic-plus"/></svg></span> 新增巡檢日誌</button></div>

  <!-- ── 三步驟巡檢流程 ─────────────────────────── -->
  <div id="safety-wizard" style="display:none;margin-bottom:16px">
    <!-- 步驟指示器 -->
    <div style="display:flex;align-items:center;gap:0;margin-bottom:18px;background:var(--s2);border:1px solid var(--bd1);border-radius:var(--r);padding:14px 18px">
      <div id="sw-s1" style="display:flex;align-items:center;gap:8px;flex:1">
        <div style="width:26px;height:26px;border-radius:50%;background:var(--gold);color:#1A1200;font-family:var(--fn);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">1</div>
        <span style="font-size:11px;font-weight:600">選擇巡檢位置與項目</span>
      </div>
      <div style="width:24px;height:1px;background:var(--bd2);flex-shrink:0"></div>
      <div id="sw-s2" style="display:flex;align-items:center;gap:8px;flex:1;opacity:.4">
        <div style="width:26px;height:26px;border-radius:50%;background:var(--bd2);color:var(--tx3);font-family:var(--fn);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">2</div>
        <span style="font-size:11px;font-weight:600">巡檢查核</span>
      </div>
      <div style="width:24px;height:1px;background:var(--bd2);flex-shrink:0"></div>
      <div id="sw-s3" style="display:flex;align-items:center;gap:8px;flex:1;opacity:.4">
        <div style="width:26px;height:26px;border-radius:50%;background:var(--bd2);color:var(--tx3);font-family:var(--fn);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">3</div>
        <span style="font-size:11px;font-weight:600">上傳照片 · 送出</span>
      </div>
    </div>

    <!-- STEP 1: 選擇巡檢位置與項目 -->
    <div id="sw-step1" class="card mb0">
      <div class="ct"><span class="bar"></span>第一步：選擇巡檢位置，勾選本次適用項目</div>
      <div class="fr fr2" style="margin-bottom:14px">
        <div class="fg"><label class="fl">巡檢日期</label><input type="date" class="fi" id="sf-date"></div>
        <div class="fg"><label class="fl">巡檢人員</label><input type="text" class="fi" id="sf-inspector" value="陳志強"></div>
      </div>
      <div class="fg" style="margin-bottom:14px">
        <label class="fl">巡檢位置（可多選）</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s3);border:1px solid var(--bd1);border-radius:var(--r-sm);padding:5px 10px;font-size:11px"><input type="checkbox" style="accent-color:var(--gold)"> B3F 底板區</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s3);border:1px solid var(--bd1);border-radius:var(--r-sm);padding:5px 10px;font-size:11px"><input type="checkbox" style="accent-color:var(--gold)"> 2F 樓板區</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s3);border:1px solid var(--bd1);border-radius:var(--r-sm);padding:5px 10px;font-size:11px"><input type="checkbox" style="accent-color:var(--gold)"> B2F 機電層</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s3);border:1px solid var(--bd1);border-radius:var(--r-sm);padding:5px 10px;font-size:11px"><input type="checkbox" style="accent-color:var(--gold)"> 北側外牆</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s3);border:1px solid var(--bd1);border-radius:var(--r-sm);padding:5px 10px;font-size:11px"><input type="checkbox" style="accent-color:var(--gold)"> 工地出入口</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s3);border:1px solid var(--bd1);border-radius:var(--r-sm);padding:5px 10px;font-size:11px"><input type="checkbox" style="accent-color:var(--gold)"> 臨時設施區</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s3);border:1px solid var(--bd1);border-radius:var(--r-sm);padding:5px 10px;font-size:11px"><input type="checkbox" style="accent-color:var(--gold)"> 材料堆置區</label>
        </div>
      </div>
      <div class="fg" style="margin-bottom:16px">
        <label class="fl">本次巡檢項目（依實際情況勾選，並非每次都需全選）</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)" checked> 高空作業安全帶</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)" checked> 圍籬及警示標示</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 消防設備有效期</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 起重機操作證照</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 電氣漏電斷路器</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 澆置區安全管制</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 車輛管制及淨高</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 個人防護具配備</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 物料堆置整齊</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;font-size:12px"><input type="checkbox" style="accent-color:var(--gold)"> 機具設備狀況</label>
        </div>
      </div>
      <div class="flex gap8">
        <button class="btn bg" onclick="safetyCancel()">取消</button>
        <button class="btn bp" onclick="safetyStep(2)"><span class="ic s14"><svg><use href="#ic-chev-r"/></svg></span> 下一步：開始查核</button>
      </div>
    </div>

    <!-- STEP 2: 巡檢查核 -->
    <div id="sw-step2" class="card mb0" style="display:none">
      <div class="ct"><span class="bar"></span>第二步：逐項查核，標記合格 / 不合格</div>
      <!-- 動態清單，由 safetyBuildStep2() 根據步驟一勾選項目生成 -->
      <div id="sf-checklist" style="display:flex;flex-direction:column;gap:4px;margin-bottom:14px"></div>
      <hr class="div">
      <div class="fg" style="margin-bottom:12px">
        <label class="fl">缺失備註（不合格項目說明）</label>
        <textarea class="fta" id="sf-remarks" placeholder="記錄發現的缺失情形、位置及責任廠商..."></textarea>
      </div>
      <div class="flex gap8">
        <button class="btn bg" onclick="safetyStep(1)"><span class="ic s14"><svg><use href="#ic-chev-r"/></svg></span> 上一步</button>
        <button class="btn bp" onclick="safetyStep(3)"><span class="ic s14"><svg><use href="#ic-chev-r"/></svg></span> 下一步：上傳照片</button>
      </div>
    </div>

    <!-- STEP 3: 上傳照片 · 驗證安危 · 送出 -->
    <div id="sw-step3" class="card mb0" style="display:none">
      <div class="ct"><span class="bar"></span>第三步：上傳照片、驗證安危，送出巡檢日報</div>
      <div onclick="toast('選擇巡檢照片','ts')" style="border:1.5px dashed var(--bd2);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;color:var(--tx3);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--bd2)'">
        <span class="ic s28"><svg><use href="#ic-cam"/></svg></span>
        <span>點擊上傳巡檢現場照片（最多 20 張）</span>
        <span style="font-size:10px;color:var(--tx3)">支援 JPG / PNG / HEIC</span>
      </div>
      <div style="background:var(--s3);border-radius:var(--r-sm);padding:13px;margin-bottom:14px">
        <div style="font-family:var(--fm);font-size:9px;color:var(--tx3);letter-spacing:1px;margin-bottom:9px;text-transform:uppercase">安危確認聲明</div>
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:12px;color:var(--tx2);line-height:1.6"><input type="checkbox" id="sf-confirm" style="accent-color:var(--gold);margin-top:2px"> 本次巡檢結果已據實記錄，所有不合格項目已當場告知責任廠商，並確認工地目前安全狀態。</label>
      </div>
      <div class="fg" style="margin-bottom:14px"><label class="fl">工安師電子簽名</label>
        <div id="sf-sign" onclick="signPad(this)" style="border:1.5px dashed var(--bd2);border-radius:var(--r-sm);padding:16px;text-align:center;cursor:pointer;color:var(--tx3);font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--bd2)'"><span class="ic s18"><svg><use href="#ic-pen"/></svg></span> 點擊完成電子簽名</div>
      </div>
      <div class="flex gap8">
        <button class="btn bg" onclick="safetyStep(2)"><span class="ic s14"><svg><use href="#ic-chev-r"/></svg></span> 上一步</button>
        <button class="btn bp" onclick="safetySend()"><span class="ic s14"><svg><use href="#ic-send"/></svg></span> 送出巡檢日報</button>
      </div>
    </div>

  </div>


</div><!-- /v-safety -->
